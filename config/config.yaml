# The configuration file defines the variables and parameters
# for the model definition

data: test.csv
filepath: data

target: [y]
features:
  - x1
  - x2
  - x3
  - x4

# Parameters for BMA

params:
  n: 2000
  burn_in: 1000
  a: null
  b: null
  betas_sd_ratio: null
  c: null
  p: null
  identity: false
  add_intercept: true
  normalize_x: true
  normalize_y: true
  seed: 42
